server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:jobportal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:mysecretkey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console